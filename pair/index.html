<!doctype html>
<meta charset="utf-8">
<title>SmartSofa Pairing</title>
<style>body{font-family:system-ui,sans-serif;max-width:480px;margin:40px auto;padding:0 16px;color:#222}a.btn{display:inline-block;background:#0066CC;color:#fff;padding:12px 20px;border-radius:8px;text-decoration:none;margin-top:16px}</style>
<h1>SmartSofa</h1>
<p id="msg">If the SmartSofa app is installed, it should open automatically. Otherwise, please install the app first.</p>
<a class="btn" id="store" href="#">Install App</a>
<script>
  // Mirror current URL into custom scheme as a fallback (if app installed but App Link unverified).
  try {
    var u = new URL(location.href);
    var name = u.searchParams.get('name') || '';
    var fallback = 'smartsofa://pair?name=' + encodeURIComponent(name);
    setTimeout(function(){ location.href = fallback; }, 800);
    document.getElementById('store').href = 'https://github.com/zqf2004111/smartSofa/releases';
  } catch(e) {}
</script>
